app:
  title: POps-Rox Platform
  baseUrl: http://localhost:3000

organization:
  # ✏️ CUSTOMIZE: Change this to your organization name
  name: POps-Rox

backend:
  baseUrl: http://localhost:7007
  listen:
    port: 7007
  csp:
    connect-src: ["'self'", 'http:', 'https:']
  cors:
    origin: http://localhost:3000
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true
  # Local development uses SQLite in-memory. Production config is in app-config.production.yaml.
  database:
    client: better-sqlite3
    connection: ':memory:'

integrations:
  github:
    - host: github.com
      # ✏️ CUSTOMIZE: Set GITHUB_TOKEN env var with a PAT that has repo and read:org scopes
      # See: https://backstage.io/docs/integrations/github/locations#configuration
      token: ${GITHUB_TOKEN}

proxy:
  ### Example for how to add a proxy endpoint for the frontend.
  # endpoints:
  #   '/test':
  #     target: 'https://example.com'
  #     changeOrigin: true

techdocs:
  builder: 'local'
  generator:
    runIn: 'docker'
  publisher:
    type: 'local'

auth:
  environment: development
  providers:
    github:
      development:
        # ✏️ CUSTOMIZE: Create a GitHub OAuth App and set these env vars
        # See: https://backstage.io/docs/auth/github/provider
        clientId: ${GITHUB_CLIENT_ID}
        clientSecret: ${GITHUB_CLIENT_SECRET}
        signIn:
          resolvers:
            - resolver: usernameMatchingUserEntityName

scaffolder:
  # see https://backstage.io/docs/features/software-templates/configuration

catalog:
  import:
    entityFilename: catalog-info.yaml
    pullRequestBranchName: backstage-integration
  rules:
    - allow: [Component, System, Group, User, Resource, Location, Template, API]

  # Local catalog entities (system definition, groups, etc.)
  locations:
    - type: file
      target: ./catalog-entities/all.yaml

  # ✏️ CUSTOMIZE: Change 'POps-Rox' to your GitHub org name
  # Auto-discovers all repos with a catalog-info.yaml in your org
  providers:
    github:
      popsRoxOrg:
        organization: 'POps-Rox'
        catalogPath: '/catalog-info.yaml'
        filters:
          repository: '.*'
        schedule:
          frequency: { minutes: 30 }
          timeout: { minutes: 3 }

  useUrlReadersSearch: true

kubernetes:
  # see https://backstage.io/docs/features/kubernetes/configuration

permission:
  enabled: true
